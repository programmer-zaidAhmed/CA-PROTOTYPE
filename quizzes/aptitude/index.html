    <main class="quiz-container"> 
        <h1 class="quiz-title">Aptitude Quiz</h1> 
        <p class="quiz-subtitle">Find your perfect career match.</p> 
 
        <div class="quiz-card"> 
            <div class="card-header"> 
                <h2>Interests & Activities</h2> 
                <p>Question 1 of 10</p> 
            </div> 
            <div class="card-body"> 
                <p class="question">Which of the following activities 
do you enjoy the most in your free time?</p> 

                <div class="options-grid"> 
                    <div class="option-card" data-value="building"> 
                        <button class="btn">Answer 1</button>   <!-- edited by me -->
                        <!-- <i class="fas fa-wrench"></i> 
                        <p>Building or fixing things</p>  -->
                    </div> 
                    <div class="option-card" data-value="puzzles"> 
                        <button class="btn">Answer 1</button>   <!-- edited by me -->
                        <!-- <i class="fas fa-brain"></i> 
                        <p>Solving puzzles or brain-teasers</p>  -->
                    </div> 
                    <div class="option-card" data-value="teaching"> 
                        <button class="btn">Answer 1</button>   <!-- edited by me -->
                        <!-- <i class="fas fa-hands-helping"></i> 
                        <p>Helping or teaching others</p>  -->
                    </div> 
                    <div class="option-card" data-value="organizing"> 
                        <button class="btn">Answer 1</button>   <!-- edited by me -->
                        <!-- <i class="fas fa-users"></i> 
                        <p>Organizing events or leading a team</p>  -->
                    </div> 
                </div> 

                <div class="navigation-buttons"> 
                    <button class="nav-btn previous-btn" 
disabled>Previous</button> 
                    <button class="nav-btn next-btn">Next 
Question</button> 
                </div> 
            </div> 
        </div> 
 
        <button class="submit-btn">Submit Quiz</button>
